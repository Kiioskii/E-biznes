version: "3.9"
services:
    app:
        build: .
        container_name: kotlin-app
        ports:
            - "8080:8080"
        volumes:
            - .:/app
        environment:
            JAVA_HOME: /usr/lib/jvm/temurin-8-jdk-amd64
            GRADLE_OPTS: "-Dorg.gradle.java.home=/usr/lib/jvm/temurin-8-jdk-amd64"
        command: gradle run --no-daemon
